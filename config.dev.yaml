# International Space Bar — Development Configuration
# Values starting with SECRET[xxx] are resolved via the secrets store at runtime.

version: 1

app:
    appVersion: "0.1.0"

server:
    port: 3000
    host: "127.0.0.1"
    enableCors: true
    corsOrigins:
        - "http://localhost:3000"

logger:
    type: pino
    logFilePath: ./logs/app.log
    level: debug

ollama:
    baseUrl: http://localhost:11434
    apiKey: SECRET[OLLAMA_API_KEY]

tavily:
    apiKey: SECRET[TAVILY_API_KEY]

models:
    default: glm-5.1:cloud
    aliases:
        opus: glm-5.1:cloud
        sonnet: deepseek-v4-pro:cloud
        haiku: ollama:gemma4:31b-cloud

paths:
    skillsRoot: .agents/skills/
    agentsConfigDir: .agents/agents/
